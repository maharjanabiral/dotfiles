background {
    path = ~/Pictures/Wallpapers/escape_velocity.jpg
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.823
    vibrancy = 0.1696

}


label {
    monitor =
    text = cmd[update:1000] echo  -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.5)
    font_size = 30
    font_family = SF Pro Display Bold
    position = 0, 400
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>" 
    color = rgba(216, 222, 233, 0.7)
    font_size = 85
    font_family = SF Pro Display Bold
    position = 0, 310
    halign = center
    valign = center
}
input-field {
    monitor =
    size = 170, 45
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    inner_color = rgba(100, 114, 125, 0.4) # no fill
    outer_color = rgba(0, 0, 0, 0.0) # no fill
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    rounding = 15

    position = 0, -425
    halign = center
    valign = center
}
